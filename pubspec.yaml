name: smart_lecture_notes
description: An AI-powered educational productivity app that helps students capture, organize, summarize, and revise lecture content efficiently.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Navigation
  cupertino_icons: ^1.0.2
  get: ^4.6.5
  
  # Audio Recording & Playback
  record: ^6.2.0
  path: ^1.8.3
  
  # Camera
  camera: ^0.10.5+2
  
  # Local Storage
  path_provider: ^2.1.5
  shared_preferences: ^2.2.3
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0

  # File selection
  file_picker: ^8.0.0
  image_picker: ^1.1.2
  
  # Charts & Analytics Dashboard
  fl_chart: ^0.63.0

  # Networking & State Management
  http: ^1.2.2
  provider: ^6.1.2
  flutter_secure_storage: ^9.2.2

  # Document Processing
  google_mlkit_text_recognition: ^0.13.0
  syncfusion_flutter_pdf: ^27.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  http: ^1.6.0 
  flutter_secure_storage: ^9.0.0
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/
    - assets/images/
    - assets/icons/
    - assets/sounds/
